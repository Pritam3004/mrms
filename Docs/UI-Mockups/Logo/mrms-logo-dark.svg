<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160" role="img" aria-label="MRMS – Mandate Review and Management System">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003865;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#001F3F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00AEEF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072BB;stop-opacity:1" />
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="globeClip2">
      <circle cx="72" cy="80" r="46"/>
    </clipPath>
  </defs>

  <!-- Dark card background -->
  <rect width="480" height="160" rx="14" fill="url(#cardBg)"/>

  <!-- Subtle top accent line -->
  <rect x="0" y="0" width="480" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- ══ EMBLEM ══ -->
  <circle cx="72" cy="80" r="51" fill="none" stroke="#00AEEF" stroke-width="1.5" opacity="0.3"/>
  <circle cx="72" cy="80" r="46" fill="#00AEEF" opacity="0.12"/>

  <!-- Globe grid -->
  <g clip-path="url(#globeClip2)" stroke="#00AEEF" stroke-width="0.9" fill="none" opacity="0.4">
    <line x1="26" y1="80" x2="118" y2="80"/>
    <ellipse cx="72" cy="80" rx="46" ry="15"/>
    <ellipse cx="72" cy="80" rx="46" ry="30"/>
    <line x1="72" y1="34" x2="72" y2="126"/>
    <line x1="49" y1="35" x2="49" y2="125"/>
    <line x1="95" y1="35" x2="95" y2="125"/>
  </g>

  <!-- Document icon -->
  <rect x="54" y="56" width="36" height="46" rx="4" fill="white" opacity="0.95"/>
  <line x1="61" y1="68" x2="83" y2="68" stroke="#003865" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="61" y1="76" x2="83" y2="76" stroke="#003865" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="61" y1="84" x2="83" y2="84" stroke="#00AEEF" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="61" y1="92" x2="74" y2="92" stroke="#00AEEF" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="83" cy="93" r="6" fill="#00AEEF"/>
  <polyline points="80,93 82.2,95.5 86.5,90.5" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Olive branches -->
  <g fill="none" stroke="#00AEEF" stroke-width="1.3" opacity="0.6">
    <path d="M38 110 Q30 104 28 96"/>
    <path d="M38 110 Q33 106 32 99"/>
    <path d="M38 110 Q28 107 26 102"/>
    <path d="M106 110 Q114 104 116 96"/>
    <path d="M106 110 Q111 106 112 99"/>
    <path d="M106 110 Q116 107 118 102"/>
    <path d="M38 110 Q72 118 106 110"/>
  </g>

  <!-- ══ WORDMARK ══ -->
  <text x="145" y="97"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="52"
        font-weight="700"
        letter-spacing="3"
        fill="url(#accentGrad)"
        filter="url(#glow2)">MRMS</text>

  <line x1="145" y1="107" x2="462" y2="107" stroke="#00AEEF" stroke-width="1" opacity="0.3"/>

  <text x="147" y="121"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="11.5" font-weight="400" letter-spacing="2.5"
        fill="white" opacity="0.75">MANDATE REVIEW &amp;</text>

  <text x="147" y="137"
        font-family="'Segoe UI', 'Arial', sans-serif"
        font-size="11.5" font-weight="400" letter-spacing="2.5"
        fill="white" opacity="0.75">MANAGEMENT SYSTEM</text>


</svg>
