<!-- DESIGN E: Scroll + Checkmark icon — represents mandate review lifecycle -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160" role="img" aria-label="MRMS – Mandate Review and Management System">
  <defs>
    <linearGradient id="scrollBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0092CA"/>
      <stop offset="100%" style="stop-color:#005F8E"/>
    </linearGradient>
    <linearGradient id="textGradE" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#005F8E"/>
      <stop offset="100%" style="stop-color:#003A5C"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0092CA" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square tile -->
  <rect x="14" y="20" width="118" height="120" rx="20" fill="url(#scrollBg)" filter="url(#shadow)"/>

  <!-- Scroll top curl -->
  <rect x="28" y="36" width="90" height="74" rx="5" fill="white" opacity="0.18"/>
  <rect x="32" y="40" width="82" height="66" rx="4" fill="white" opacity="0.95"/>

  <!-- Scroll lines (mandate text rows) -->
  <line x1="42" y1="54" x2="104" y2="54" stroke="#005F8E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="63" x2="104" y2="63" stroke="#005F8E" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="72" x2="88"  y2="72" stroke="#0092CA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="81" x2="96"  y2="81" stroke="#0092CA" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="42" y1="89" x2="80"  y2="89" stroke="#0092CA" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Big tick (review/approval) -->
  <circle cx="100" cy="89" r="12" fill="#005F8E"/>
  <polyline points="94,89 98.5,94 107,83" fill="none" stroke="white" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom curl on scroll -->
  <ellipse cx="73" cy="107" rx="41" ry="6" fill="white" opacity="0.2"/>

  <!-- ── Wordmark ── -->
  <!-- MRMS large bold -->
  <text x="154" y="97"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="56" font-weight="800" letter-spacing="2"
        fill="url(#textGradE)">MRMS</text>

  <!-- Full-width thin rule -->
  <rect x="154" y="104" width="306" height="2" rx="1" fill="#0092CA" opacity="0.35"/>

  <!-- Full name -->
  <text x="157" y="119"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="500" letter-spacing="2.8"
        fill="#005F8E" opacity="0.9">MANDATE REVIEW &amp;</text>
  <text x="157" y="134"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="11" font-weight="500" letter-spacing="2.8"
        fill="#005F8E" opacity="0.9">MANAGEMENT SYSTEM</text>
</svg>
